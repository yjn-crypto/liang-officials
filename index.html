<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f5f0eb;--surface:#fefcf8;--text:#2c2c2c;--t2:#6b6b6b;--accent:#8b4513;--green:#2d6a2d;--brd:#d4c9b8;--tab-bg:#ede5d8}
html{font-size:16px}body{font-family:"Noto Serif SC","SimSun","STSong",serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.hdr{background:linear-gradient(135deg,#5c3a1e,#8b4513);color:#f5f0eb;padding:16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hdr h1{font-size:1.35rem;font-weight:700;letter-spacing:3px}.hdr .sub{font-size:.78rem;opacity:.85;letter-spacing:1px;margin-top:2px}
.tabs{display:flex;background:var(--tab-bg);border-bottom:2px solid var(--brd);position:sticky;top:0;z-index:99}
.tab{flex:1;text-align:center;padding:12px 8px;font-size:.93rem;font-weight:600;cursor:pointer;color:var(--t2);border-bottom:3px solid transparent;transition:all .2s;user-select:none;letter-spacing:1px}
.tab:hover{background:rgba(139,69,19,.08)}.tab.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface)}
.main{max-width:1200px;margin:0 auto;padding:16px}.page{display:none}.page.on{display:block}
.card{background:var(--surface);border:1px solid var(--brd);border-radius:6px;padding:18px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ct{font-size:1.05rem;font-weight:700;color:var(--accent);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--brd);letter-spacing:1px}.ct .nt{font-weight:400;font-size:.8rem;color:var(--t2);margin-left:8px}
input[type="text"],textarea{width:100%;padding:10px 12px;border:1px solid var(--brd);border-radius:4px;font-size:.95rem;font-family:inherit;background:#fff;transition:border-color .2s;color:var(--text)}
input[type="text"]:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(139,69,19,.12)}textarea{resize:vertical;min-height:90px}
.bg{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;align-items:center}
.btn{padding:8px 18px;border:1px solid var(--brd);border-radius:4px;font-size:.88rem;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--text);transition:all .2s;user-select:none}
.btn:hover{background:var(--tab-bg)}.pri{background:var(--accent);color:#fff;border-color:var(--accent)}.pri:hover{background:#a0522d}
.clr{background:transparent;color:var(--t2);border-color:transparent;padding:8px 10px}.clr:hover{background:rgba(0,0,0,.05)}
.ai-btn{background:#d4830f;color:#fff;border-color:#d4830f}.ai-btn:hover{background:#b8720d}
.ra{margin-top:12px}.ri{padding:10px 12px;border-bottom:1px solid #eee;display:flex;flex-wrap:wrap;align-items:baseline;gap:4px 12px}.ri:last-child{border-bottom:none}
.rl{font-weight:600}.rv{color:var(--green);font-weight:600}.rs{color:var(--t2);font-size:.78rem}.rsub{color:var(--t2);font-size:.82rem;font-style:italic}
.nf{text-align:center;color:var(--t2);padding:30px 0;font-style:italic}.ld{text-align:center;color:var(--t2);padding:10px 0;font-size:.85rem}
.sh{display:flex;justify-content:space-between;padding:8px 0;border-bottom:2px solid var(--accent);font-weight:700;font-size:.85rem}
.sh .c1{flex:2}.sh .c2{flex:1;text-align:right}
.sr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;font-size:.88rem}
.sr .c1{flex:2;word-break:break-all}.sr .c2{flex:1;text-align:right;color:var(--green)}.sr .c2.warn{color:#d4830f}.sr .c2 .sub{font-size:.78rem;font-style:italic;color:var(--t2)}
.ait{color:#d4830f;font-size:.75rem}.gs{background:var(--surface);border:1px solid var(--brd);border-radius:6px;padding:16px;margin-bottom:16px}
.dbg{background:#fffbe6;border:1px solid #ffe58f;border-radius:4px;padding:10px;margin:10px 0;font-size:.78rem;font-family:monospace}
.zb{display:flex;align-items:center;gap:10px;margin:10px 0;flex-wrap:wrap}.zb .lb{font-size:.85rem;color:var(--t2)}
.tw{overflow:auto;border:1px solid var(--brd);border-radius:4px;max-height:70vh;background:var(--surface)}
.gt{font-size:.78rem;border-collapse:collapse;white-space:nowrap;min-width:100%}
.gt th,.gt td{border:1px solid #ddd;padding:5px 8px;text-align:center;min-width:70px}
.gt th{background:var(--tab-bg);font-weight:700;position:sticky;top:0;z-index:2}
.gt th:first-child,.gt td:first-child{position:sticky;left:0;z-index:1;background:var(--surface);font-weight:700;min-width:80px}
.gt th:first-child{z-index:3;background:var(--tab-bg)}
.gc{cursor:pointer;font-weight:600;padding:2px;display:inline-block}.gc:hover{text-decoration:underline}.ge{color:#ccc}
.mov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}

.mh{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--brd)}
.mh h3{font-size:1.1rem}.mx{font-size:1.3rem;cursor:pointer;color:var(--t2);padding:0 4px;line-height:1}.mx:hover{color:var(--text)}

</style>
</head>

function queryGenExact(name) {
  if (name.indexOf('将军') < 0 && name.indexOf('大将军') < 0) return null;
  var pds = [{title:'天监七年', data:GD.tianjianSeven, max:24}, {title:'大通三年', data:GD.datongThree, max:28}];
  var rs = [];
  for (var pi = 0; pi < pds.length; pi++) {
    var p = pds[pi], base = null;
    if (p.data[name]) base = p.data[name];
    else {
      var nd = name.replace('大将军', '将军');
      if (p.data[nd]) base = p.data[nd];
      var ng = name.replace('大将军', '');
      if (!base && ng !== name && p.data[ng]) base = p.data[ng];
      var nj = name.replace('将军', '');
      if (!base && nj !== name && p.data[nj]) base = p.data[nj];
    }
    if (base) {
      var txt = base.text;
      if (name.indexOf('大将军') >= 0 && base.regular) {
        var n = base.number;
        if (n < p.max) { n++; txt = n + '班'; }
      }
      rs.push({title: p.title, result: txt});
    } else { rs.push({title: p.title, result: '该将军号不存在'}); }
  }
  if (rs.some(function(r){ return r.result.indexOf('不存在') < 0; })) return rs;
  return null;
}

function hasPunc(s) {
  for (var pi = 0; pi < s.length; pi++) {
    var c = s.charCodeAt(pi);
    if (c < 0x2E80) {
      if ((c >= 0x21 && c <= 0x2F) || (c >= 0x3A && c <= 0x40) || (c >= 0x5B && c <= 0x60) || (c >= 0x7B && c <= 0x7E)) return true;
    }
    if ((c >= 0x2000 && c <= 0x206F) || (c >= 0x3000 && c <= 0x303F) || (c >= 0xFF00 && c <= 0xFFEF)) return true;
  }
  return false;
}
function scanText(text) {
  var maxL = 30, minL = 2, found = [];
  for (var i = 0; i < text.length; i++) {
    for (var j = i + minL; j <= Math.min(text.length, i + maxL); j++) {
      var sub = text.substring(i, j);
      if (hasPunc(sub)) continue;
      var rr = localQ(sub);
      if (rr.length > 0) found.push({name: sub, type: '官', result: rr[0].result, standardName: rr[0].standardName || '', start: i, end: j});
      if (sub.indexOf('将军') >= 0) {
        var gr = queryGen(sub);
        if (gr && gr.some(function(g){ return g.result.indexOf('不存在') < 0; })) {
          found.push({name: sub, type: '军', result: gr.map(function(g){ return g.title + ': ' + g.result; }).join('；'), standardName: '', start: i, end: j});
        }
      }
    }
  }
  found.sort(function(a, b){ return a.start - b.start || b.end - a.end; });
  var filt = [], lastEnd = -1;
  for (var fi = 0; fi < found.length; fi++) {
    if (found[fi].start >= lastEnd) { filt.push(found[fi]); lastEnd = found[fi].end; }
    else if (found[fi].end > lastEnd) { filt.pop(); filt.push(found[fi]); lastEnd = found[fi].end; }
  }
  return filt;
}
function fuzzUnknown(rs) {
  for (var i = 0; i < rs.length; i++) {
    if (rs[i].result === '无法确认官班') {
      var fr = fuzzyQ(rs[i].name);
      if (fr.length > 0 && fr[0].result !== '该官职在官班中不存在') {
        rs[i].result = fr.map(function(r){ return r.result; }).join('；');
        rs[i].standardName = fr.map(function(r){ return r.standardName; }).filter(Boolean).join('、');
        rs[i].fuzzyMatched = true;
      }
    }
  }
  return rs;
}

// ===== AI 配置（API Key 不存前端！） =====
// 部署 Cloudflare Worker 后把下面 URL 替换为你的 Worker 地址（见 cloudflare-worker/ 目录）
var WORKER_URL = 'https://liang-officials-api.flaxen-break.workers.dev';

function isAIReady() { return WORKER_URL && WORKER_URL.indexOf('https://') === 0; }

async function callAI(mode, query) {
  if (!isAIReady()) throw new Error('AI 未配置。请部署 Cloudflare Worker。');
  var resp = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode: mode, query: query })
  });
  if (!resp.ok) throw new Error('AI API (' + resp.status + '): ' + (await resp.text()));
  return await resp.json();
}
async function queryAI(inp) {
  var data = await callAI('query', inp);
  if (data && Array.isArray(data) && data.length > 0) {
    return data.map(function(item){ return { display: inp, result: item.result || '无法确定', standardName: '', source: 'DeepSeek推理' }; });
  }
  return [{ display: inp, result: 'DeepSeek 无法确定', standardName: '', source: 'DeepSeek' }];
}

var scanCache = [], rankMode = 0;
function switchTab(idx) {
  var tabs = document.querySelectorAll('.tab'), pages = document.querySelectorAll('.page');
  for (var i = 0; i < tabs.length; i++) { tabs[i].classList.toggle('on', i === idx); pages[i].classList.toggle('on', i === idx); }
  if (idx === 1 && !window.govLoaded) loadGov();
}
function setMode(m) { rankMode = m; document.getElementById('mExact').classList.toggle('on', m === 0); document.getElementById('mFuzzy').classList.toggle('on', m === 1); }

function qRank() {
  var inp = document.getElementById('iRank').value.trim(), cont = document.getElementById('rRank'), btnAI = document.getElementById('btnAIRank');
  if (!inp) { cont.innerHTML = '<div class="nf">请输入官职名</div>'; btnAI.style.display = 'none'; return; }
  renderRank(queryRank(inp, rankMode === 1), cont);
  btnAI.style.display = isAIReady() ? 'inline-block' : 'none';
}
function cRank() { document.getElementById('iRank').value = ''; document.getElementById('rRank').innerHTML = ''; document.getElementById('btnAIRank').style.display = 'none'; }
function renderRank(res, cont) {
  if (!res || res.length === 0 || res[0].result === '该官职在官班中不存在') {
    cont.innerHTML = '<div class="nf">' + (res && res[0] ? esc(res[0].result) : '该官职在官班中不存在') + '</div>'; return;
  }
  var html = '';
  for (var i = 0; i < res.length; i++) {
    var r = res[i];
    html += '<div class="ri"><span class="rl">' + esc(r.display) + '</span><span class="rv">' + esc(r.result) + '</span>';
    if (r.standardName && r.standardName !== r.display) html += '<span class="rsub">（' + esc(r.standardName) + '）</span>';
    html += '<span class="rs">' + esc(r.source) + '</span></div>';
  }
  cont.innerHTML = html;
}
async function qRankAI() {
  var inp = document.getElementById('iRank').value.trim(), cont = document.getElementById('rRank'), btn = document.getElementById('btnAIRank');
  if (!inp) return;
  btn.textContent = '思考中...';
  try { renderRank(await queryAI(inp), cont); } catch (e) { cont.innerHTML = '<div class="nf">AI 失败：' + esc(e.message) + '</div>'; }
  btn.textContent = 'AI 查询';
}

function qGen() {
  var inp = document.getElementById('iGen').value.trim(), cont = document.getElementById('rGen');
  if (!inp) { cont.innerHTML = '<div class="nf">请输入将军号</div>'; return; }
  var res = queryGen(inp);
  if (!res || res.every(function(r){ return r.result === '该将军号不存在'; })) { cont.innerHTML = '<div class="nf">该军号在将军班中不存在</div>'; return; }
  var html = '';
  for (var i = 0; i < res.length; i++) html += '<div class="ri"><span class="rl">' + esc(res[i].title) + '</span><span class="rv">' + esc(res[i].result) + '</span></div>';
  cont.innerHTML = html;
}
function cGen() { document.getElementById('iGen').value = ''; document.getElementById('rGen').innerHTML = ''; }

function doScan() {
  var text = document.getElementById('iScan').value;
  if (!text.trim()) return;
  document.getElementById('sStatus').style.display = 'block'; document.getElementById('rScan').innerHTML = '';
  setTimeout(function() {
    var res = fuzzUnknown(scanText(text)); scanCache = res; renderScan(res);
    document.getElementById('sStatus').style.display = 'none';
    document.getElementById('btnAIscan').style.display = res.length > 0 ? 'inline-block' : 'none';
    document.getElementById('btnAIdeep').style.display = (isAIReady() && res.length > 0) ? 'inline-block' : 'none';
  }, 50);
}
function doScanAI() {
  var text = document.getElementById('iScan').value;
  if (!text.trim()) return;
  var exist = {}; for (var i = 0; i < scanCache.length; i++) exist[scanCache[i].name] = true;
  var news = [];
  for (var len = 4; len <= 12; len++) {
    for (var i2 = 0; i2 <= text.length - len; i2++) {
      var sub = text.substring(i2, i2 + len);
      if (hasPunc(sub) || exist[sub]) continue;
      var rr = fuzzyQ(sub);
      if (rr.length > 0 && rr[0].result !== '该官职在官班中不存在') {
        news.push({name: sub, type: '官', result: rr[0].result, standardName: rr[0].standardName || '', start: i2, end: i2 + len, source: 'AI推测'});
        exist[sub] = true;
      }
    }
  }
  scanCache = scanCache.concat(news);
  scanCache.sort(function(a, b){ return a.start - b.start || b.end - a.end; });
  var filt = [], lastEnd = -1;
  for (var fi = 0; fi < scanCache.length; fi++) {
    if (scanCache[fi].start >= lastEnd) { filt.push(scanCache[fi]); lastEnd = scanCache[fi].end; }
    else if (scanCache[fi].end > lastEnd) { filt.pop(); filt.push(scanCache[fi]); lastEnd = scanCache[fi].end; }
  }
  scanCache = filt; renderScan(scanCache);
  if (news.length === 0) alert('未发现新的遗漏官职');
}
async function doScanDeep() {
  var text = document.getElementById('iScan').value, btn = document.getElementById('btnAIdeep');
  if (!text.trim()) return;
  btn.textContent = '分析中...';
  try {
    var aiResult = await callAI('extract_offices', text);
    if (!aiResult || !Array.isArray(aiResult) || aiResult.length === 0) { alert('AI 未识别到新的遗漏官职。'); return; }
    var exist = {}; for (var i = 0; i < scanCache.length; i++) exist[scanCache[i].name] = true;
    var news = [];
    for (var i2 = 0; i2 < aiResult.length; i2++) {
      var name = aiResult[i2];
      if (exist[name]) continue;
      var rr = localQ(name);
      if (rr.length > 0) {
        var idx = text.indexOf(name);
        news.push({name: name, type: '官', result: rr[0].result, standardName: rr[0].standardName || '', start: idx >= 0 ? idx : text.length + 1, end: idx >= 0 ? idx + name.length : text.length + 1, source: 'AI推测'});
        exist[name] = true;
      } else {
        var gr = queryGen(name);
        if (gr && gr.some(function(g){ return g.result.indexOf('不存在') < 0; })) {
          var idx2 = text.indexOf(name);
          news.push({name: name, type: '军', result: gr.map(function(g){ return g.title + ': ' + g.result; }).join('；'), standardName: '', start: idx2 >= 0 ? idx2 : text.length + 1, end: idx2 >= 0 ? idx2 + name.length : text.length + 1, source: 'AI推测'});
          exist[name] = true;
        }
      }
    }
    scanCache = scanCache.concat(news);
    scanCache.sort(function(a, b){ return a.start - b.start || b.end - a.end; });
    var filt = [], lastEnd = -1;
    for (var fi = 0; fi < scanCache.length; fi++) {
      if (scanCache[fi].start >= lastEnd) { filt.push(scanCache[fi]); lastEnd = scanCache[fi].end; }
      else if (scanCache[fi].end > lastEnd) { filt.pop(); filt.push(scanCache[fi]); lastEnd = scanCache[fi].end; }
    }
    scanCache = filt; renderScan(scanCache);
    if (news.length === 0) alert('AI 未发现新的遗漏官职');
  } catch (e) { alert('AI 分析失败：' + e.message); }
  btn.textContent = 'AI 补全遗漏官职';
}
function renderScan(res) {
  var cont = document.getElementById('rScan');
  if (!res || res.length === 0) { cont.innerHTML = '<div class="nf">未识别到任何官职或军号</div>'; return; }
  var html = '<div class="sh"><span class="c1">官职 / 军号</span><span class="c2">班次</span></div>';
  for (var i = 0; i < res.length; i++) {
    var r = res[i];
    html += '<div class="sr"><span class="c1">' + esc(r.name);
    if (r.source === 'AI推测') html += ' <span class="ait">（AI推测）</span>';
    html += '</span><span class="' + (!r.fuzzyMatched && (r.result === '无法确认官班' || r.result.indexOf('不存在') >= 0) ? 'c2 warn' : 'c2') + '">' + esc(r.result);
    if (r.standardName) html += ' <span class="sub">（' + esc(r.standardName) + '）</span>';
    html += '</span></div>';
  }
  cont.innerHTML = html;
}
function cScan() {
  document.getElementById('iScan').value = ''; document.getElementById('rScan').innerHTML = '';
  document.getElementById('sStatus').style.display = 'none';
  document.getElementById('btnAIscan').style.display = 'none'; document.getElementById('btnAIdeep').style.display = 'none';
  scanCache = [];
}

// Governor
var gvScale = 1;
function loadGov() {
  document.getElementById('gvStatus').textContent = '加载中...';
  fetch('governors.json').then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(d) {
    window.govData = d; window.govLoaded = true;
    document.getElementById('gvStatus').textContent = '加载完成 (' + d.yearOrder.length + '年×' + d.stateOrder.length + '州)';
    buildGovTbl();
  }).catch(function(e) { document.getElementById('gvStatus').textContent = '加载失败: ' + e.message; });
}
function buildGovTbl() {
  var d = window.govData; if (!d) return;
  var hdr = document.getElementById('gvH'), htm = '<th>年份</th>';
  for (var si = 0; si < d.stateOrder.length; si++) htm += '<th>' + esc(d.stateOrder[si]) + '</th>';
  hdr.innerHTML = htm;
  var bdy = document.getElementById('gvB'), bhtm = '';
  for (var yi = 0; yi < d.yearOrder.length; yi++) {
    var yr = d.yearOrder[yi]; bhtm += '<tr><td>' + esc(yr) + '</td>';
    for (var si2 = 0; si2 < d.stateOrder.length; si2++) {
      var st = d.stateOrder[si2], cd = null;
      if (d.data[yr] && d.data[yr][st]) {
        for (var ei = 0; ei < d.data[yr][st].length; ei++) {
          if (d.data[yr][st][ei].type === 'governor') { cd = d.data[yr][st][ei]; break; }
        }
      }
      if (cd) {
        var col = cd.color || '#333';
        if (col.indexOf('#') !== 0 && col !== 'black' && col !== 'white') col = '#' + col;
        var nm = cd.text || '';
        bhtm += '<td><span class="gc" style="color:' + col + '" data-year="' + escAttr(yr) + '" data-state="' + escAttr(st) + '" title="' + esc(nm) + '">' + esc(nm.length > 12 ? nm.substring(0, 11) + '...' : nm) + '</span></td>';
      } else { bhtm += '<td><span class="ge">-</span></td>'; }
    }
    bhtm += '</tr>';
  }
  bdy.innerHTML = bhtm;
  document.getElementById('gvInfo').textContent = d.yearOrder.length + '年×' + d.stateOrder.length + '州';
  applyZoom();
}
function showCard(yr, st) {
  var d = window.govData; if (!d || !d.data[yr] || !d.data[yr][st]) return;
  var ents = d.data[yr][st], gov = null, evts = [], smPrefs = [];
  for (var i = 0; i < ents.length; i++) {
    if (ents[i].type === 'governor') { if (!gov) gov = ents[i]; }
    else if (ents[i].type === 'event') evts.push(ents[i].text);
    else if (ents[i].type === 'small_prefecture') smPrefs.push(ents[i].text);
  }
  if (!gov) {
    document.getElementById('mTitle').textContent = yr + ' ' + st;
    var bd = '';
    if (evts.length > 0) bd += '<div class="mf"><div class="lb">事件</div><div class="vl">' + evts.join('<br>') + '</div></div>';
    document.getElementById('mBody').innerHTML = bd || '<div class="nf">无详细数据</div>';
    document.getElementById('gvModal').style.display = 'flex'; return;
  }
  var col = gov.color || '#333';
  if (col.indexOf('#') !== 0 && col !== 'black' && col !== 'white') col = '#' + col;
  document.getElementById('mTitle').innerHTML = '<span style="color:' + col + '">' + esc(gov.text) + '</span>';
  var bd = '';
  bd += '<div class="mf"><div class="lb">年份</div><div class="vl">' + esc(yr) + '</div></div>';
  bd += '<div class="mf"><div class="lb">州</div><div class="vl">' + esc(st) + '</div></div>';
  if (gov.identity) bd += '<div class="mf"><div class="lb">身份</div><div class="vl">' + esc(gov.identity) + '（' + esc(gov.category || '') + '）</div></div>';
  if (gov.comment) bd += '<div class="mf"><div class="lb">完整官衔/批注</div><div class="vl" style="white-space:pre-wrap">' + esc(gov.comment) + '</div></div>';
  if (gov.subordinates && gov.subordinates.length > 0) {
    bd += '<div class="mf"><div class="lb">属官</div><div class="vl">';
    for (var si = 0; si < gov.subordinates.length; si++) bd += (gov.subordinates[si].text || gov.subordinates[si]) + '<br>';
    bd += '</div></div>';
  }
  if (smPrefs.length > 0) {
    bd += '<div class="mf"><div class="lb">小州刺史</div><div class="vl">';
    for (var pi = 0; pi < smPrefs.length; pi++) bd += esc(smPrefs[pi]) + '<br>';
    bd += '</div></div>';
  }
  if (evts.length > 0) {
    bd += '<div class="mf"><div class="lb">事件</div><div class="vl">';
    for (var ei2 = 0; ei2 < evts.length; ei2++) bd += esc(evts[ei2]) + '<br>';
    bd += '</div></div>';
  }
  document.getElementById('mBody').innerHTML = bd;
  document.getElementById('gvModal').style.display = 'flex';
}
function closeModal(e) { if (e && e.target !== e.currentTarget) return; document.getElementById('gvModal').style.display = 'none'; }
async function parseGov() {
  var text = document.getElementById('iGov').value.trim();
  if (!text) { alert('请先粘贴史料文本'); return; }
  if (!isAIReady()) {
    alert('AI 服务未配置。请部署 Cloudflare Worker（见 cloudflare-worker/ 目录说明）。'); return;
  }
  var btn = document.getElementById('btnParseGov'); btn.textContent = '解析中...';
  try {
    var result = await callAI('extract_governor', text);
    if (result && Array.isArray(result) && result.length > 0) {
      var msg = 'AI 识别到以下刺史任命：\n\n';
      result.forEach(function(item, i) {
        msg += '[' + (i + 1) + '] ' + (item.year || '?') + ' ' + (item.region || '?') + '：' + (item.governor || '?') + '\n';
      });
      alert(msg);
    } else { alert('AI 未能提取出刺史任命信息。'); }
  } catch (e) { alert('AI 解析失败：' + e.message); }
  btn.textContent = 'AI 解析史料';
}
function clearGov() {
  if (confirm('确定要清空所有刺史数据吗？')) {
    window.govLoaded = false; window.govData = null;
    document.getElementById('gvH').innerHTML = ''; document.getElementById('gvB').innerHTML = '';
    document.getElementById('gvStatus').textContent = '已清空，重新加载中...';
    loadGov();
  }
}
function zoomIn() { gvScale = Math.min(2, gvScale + 0.1); applyZoom(); }
function zoomOut() { gvScale = Math.max(0.5, gvScale - 0.1); applyZoom(); }
function applyZoom() {
  var tbl = document.getElementById('gvT');
  if (tbl) { tbl.style.transform = 'scale(' + gvScale + ')'; tbl.style.transformOrigin = 'left top'; }
  document.getElementById('gvZoom').textContent = Math.round(gvScale * 100) + '%';
}
function esc(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function escAttr(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
document.addEventListener('click', function(e) {
  var el = e.target;
  while (el && !el.classList.contains('gc')) el = el.parentElement;
  if (el && el.dataset.year && el.dataset.state) showCard(el.dataset.year, el.dataset.state);
});
